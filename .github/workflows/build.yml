name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/acme-bank-inc/online-banking-portal:latest,ghcr.io/acme-bank-inc/online-banking-portal:${{ github.sha }}
          build-args: |
            VITE_AUTH0_DOMAIN=acme-bank-inc.us.auth0.com
            VITE_AUTH0_CLIENT_ID=cnCLsJ9gqA5AJKcndmUBdbZUf5eWFwh3
            VITE_AUTH0_AUDIENCE=https://api.acmebank.com
